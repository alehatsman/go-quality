name: go-quality-vet
description: Run go vet.
version: 1.0.0

props:
  go_tags:
    type: string
    default: ""
    description: Build tags (e.g. "sqlite_fts5"). Empty = none.
  pkg:
    type: string
    default: "./..."
    description: Package pattern to vet.

steps:
  - name: go vet
    shell: go vet {% if props.go_tags %}-tags "{{ props.go_tags }}"{% endif %} {{ props.pkg }}
