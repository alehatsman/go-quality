name: go-quality
description: >-
  Shared Go quality-gate toolchain — one canonical lint config, static-analysis
  scripts, and CI gates for mooncake, dex, moongit, and future Go repos.
# Export names map to component (preset) files at the module root. component_dir
# resolves to filepath.Dir of the component file, so keeping these at the root
# (alongside scripts/ and .golangci.yml) lets each component reference
# `{{ component_dir }}/scripts/...` directly (mooncake#42).
exports:
  # Aggregate gates
  default: ci.yml             # full pre-push gate (build+test+lint+vuln+arch+budget+dupl)
  ci: ci.yml
  ci-fast: fast.yml           # fast pre-commit gate (vet+fmt+ai-lint+budget)
  tools: tools.yml            # install + verify the static-analysis toolchain
  sync-config: sync-config.yml # drop the shared .golangci.yml into the consumer

  # Individual stages
  build: build.yml
  test: test.yml
  fmt: fmt.yml
  vet: vet.yml
  lint: lint.yml
  vuln: vuln.yml
  scan: scan.yml              # lint + vuln
  ai-lint: ai-lint.yml
  arch-snapshot: arch-snapshot.yml
  budget-status: budget-status.yml
  dupl: dupl.yml
