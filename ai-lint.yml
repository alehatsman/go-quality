name: go-quality-ai-lint
description: Sweep Go source for AI-agent artifacts (stub panics, agent-tagged TODOs, prompt-dialog comments). Scans staged files by default.
version: 1.0.0

props:
  args:
    type: string
    default: ""
    description: Extra args for ai-lint.sh (e.g. "--all" to scan every tracked file, "--warn-only").

steps:
  - name: ai-lint
    shell: bash "{{ component_dir }}/scripts/ai-lint.sh" {{ props.args }}
