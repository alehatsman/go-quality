name: go-quality-tools
description: Install the static-analysis toolchain (golangci-lint, govulncheck, gosec, gocyclo, goda, dupl) and verify it's present.
version: 1.0.0

steps:
  - name: install static-analysis tools
    shell: bash "{{ component_dir }}/scripts/install-tools.sh"

  - name: verify tools present
    shell: bash "{{ component_dir }}/scripts/check-tools.sh"
